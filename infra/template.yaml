AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: GymLaunch Intelligence — data lake sync Lambdas

Parameters:
  DbHost:
    Type: String
  DbName:
    Type: String
    Default: gymlaunch_intelligence
  DbUser:
    Type: String
    Default: gls_writer
  DbPassword:
    Type: String
    NoEcho: true
  SlackBotToken:
    Type: String
    NoEcho: true
  AsanaToken:
    Type: String
    NoEcho: true
  DbSecurityGroupId:
    Type: String
  SubnetIds:
    Type: CommaDelimitedList

Globals:
  Function:
    Runtime: python3.11
    Timeout: 900
    MemorySize: 512
    Environment:
      Variables:
        DB_HOST: !Ref DbHost
        DB_NAME: !Ref DbName
        DB_USER: !Ref DbUser
        DB_PASSWORD: !Ref DbPassword

Resources:

  SlackSyncRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: gymlaunch-slack-sync
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !Sub "arn:aws:iam::${AWS::AccountId}:policy/gymlaunch-lambda-boundary"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole

  SlackSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-slack-sync
      CodeUri: ../src/sync/slack/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          SLACK_BOT_TOKEN: !Ref SlackBotToken
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        HourlySync:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Name: gymlaunch-slack-sync-hourly
            Enabled: true

  AsanaSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-asana-sync
      CodeUri: ../src/sync/asana/agency_board/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          ASANA_TOKEN: !Ref AsanaToken
          ASANA_PROJECT_GID: "1206006426591402"
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        HourlySync:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Name: gymlaunch-asana-sync-hourly
            Enabled: true


  AsanaDeepSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-asana-deep-sync
      CodeUri: ../src/sync/asana/deep/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          ASANA_TOKEN: !Ref AsanaToken
          ASANA_PROJECT_GID: "1206006426591402"
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        DailySync:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
            Name: gymlaunch-asana-deep-sync-daily
            Enabled: true

Outputs:
  SlackFunctionArn:
    Value: !GetAtt SlackSyncFunction.Arn
  AsanaFunctionArn:
    Value: !GetAtt AsanaSyncFunction.Arn
  AsanaDeepSyncFunctionArn:
    Value: !GetAtt AsanaDeepSyncFunction.Arn
  RoleArn:
    Value: !GetAtt SlackSyncRole.Arn
