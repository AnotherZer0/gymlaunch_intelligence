AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: GymLaunch Intelligence — data lake sync Lambdas

Parameters:
  DbHost:
    Type: String
  DbName:
    Type: String
    Default: gymlaunch_intelligence
  DbUser:
    Type: String
    Default: gls_writer
  DbPassword:
    Type: String
    NoEcho: true
  SlackBotToken:
    Type: String
    NoEcho: true
  AsanaToken:
    Type: String
    NoEcho: true
  HubspotToken:
    Type: String
    NoEcho: true
  GoogleServiceAccountB64:
    Type: String
    NoEcho: true
  GoogleSheetId:
    Type: String
  DbSecurityGroupId:
    Type: String
  SubnetIds:
    Type: CommaDelimitedList
  TwilioAuthToken:
    Type: String
    NoEcho: true
  OctopodWebhookUrls:
    Type: String
    NoEcho: true
  TwilioAccountSid:
    Type: String
    NoEcho: true
  FathomWebhookSecret:
    Type: String
    NoEcho: true
  StripeApiKeysB64:
    Type: String
    NoEcho: true
  SesFromAddress:
    Type: String
  SesToAddress:
    Type: String

Globals:
  Function:
    Runtime: python3.11
    Timeout: 900
    MemorySize: 512
    Environment:
      Variables:
        DB_HOST: !Ref DbHost
        DB_NAME: !Ref DbName
        DB_USER: !Ref DbUser
        DB_PASSWORD: !Ref DbPassword

Resources:

  SlackSyncRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: gymlaunch-slack-sync
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !Sub "arn:aws:iam::${AWS::AccountId}:policy/gymlaunch-lambda-boundary"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole

  SlackSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-slack-sync
      CodeUri: ../src/sync/slack/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          SLACK_BOT_TOKEN: !Ref SlackBotToken
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        HourlySync:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Name: gymlaunch-slack-sync-hourly
            Enabled: true

  AsanaSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-asana-agency-board-sync
      CodeUri: ../src/sync/asana/agency_board/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          ASANA_TOKEN: !Ref AsanaToken
          ASANA_PROJECT_GID: "1206006426591402"
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        HourlySync:
          Type: Schedule
          Properties:
            Schedule: cron(0 * * * ? *)
            Name: gymlaunch-asana-agency-board-sync-hourly
            Enabled: true

  HubspotSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-sync-agency-board-to-hubspot
      CodeUri: ../src/sync/hubspot/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          HUBSPOT_TOKEN: !Ref HubspotToken
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        HourlySync:
          Type: Schedule
          Properties:
            Schedule: cron(10 * * * ? *)
            Name: gymlaunch-sync-agency-board-to-hubspot-hourly
            Enabled: true


  SheetsSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-mb-capacity-sheet-sync
      CodeUri: ../src/sync/sheets/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          GOOGLE_SERVICE_ACCOUNT_B64: !Ref GoogleServiceAccountB64
          GOOGLE_SHEET_ID: !Ref GoogleSheetId
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        BusinessHoursSync:
          Type: Schedule
          Properties:
            Schedule: cron(0 12,16,20,0 * * ? *)
            Name: gymlaunch-sheets-sync-biz-hours
            Enabled: true

  AsanaDeepSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-asana-agency-board-deep-sync
      CodeUri: ../src/sync/asana/deep/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          ASANA_TOKEN: !Ref AsanaToken
          ASANA_PROJECT_GID: "1206006426591402"
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        DailySync:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
            Name: gymlaunch-asana-agency-board-deep-sync-daily
            Enabled: true

  # API Gateway for Twilio webhooks (inbound messages + status callbacks).
  # Both routes are handled by a single Lambda to share the HubSpot client and DB connection.
  SmsApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      Name: gymlaunch-intelligence

  SmsInterceptorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-sms-interceptor
      CodeUri: ../src/sms/interceptor/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Timeout: 29  # API Gateway HTTP API max integration timeout
      Environment:
        Variables:
          HUBSPOT_TOKEN: !Ref HubspotToken
          TWILIO_AUTH_TOKEN: !Ref TwilioAuthToken
          OCTOPODS_WEBHOOK_URLS: !Ref OctopodWebhookUrls
          # Maps Twilio numbers to channel names. Edit this JSON to add/remove numbers.
          # Format: {"ChannelName": ["+1XXXXXXXXXX", ...], ...}
          # Channel names must match the internal names in the sms_subscriptions HubSpot property.
          # After editing, run: bash scripts/deploy.sh
          TWILIO_NUMBER_CHANNELS: '{"Marketing": ["+12135661157", "+12135613526", "+12135795481"]}'
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        InboundSms:
          Type: HttpApi
          Properties:
            ApiId: !Ref SmsApi
            Path: /sms/inbound
            Method: POST
        StatusCallback:
          Type: HttpApi
          Properties:
            ApiId: !Ref SmsApi
            Path: /sms/status
            Method: POST

  PhoneValidatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-phone-validator
      CodeUri: ../src/phone/validator/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Timeout: 29  # API Gateway HTTP API max integration timeout
      Environment:
        Variables:
          TWILIO_ACCOUNT_SID: !Ref TwilioAccountSid
          TWILIO_AUTH_TOKEN: !Ref TwilioAuthToken
      Events:
        ValidatePhone:
          Type: HttpApi
          Properties:
            ApiId: !Ref SmsApi
            Path: /phone/validate
            Method: POST

  FathomWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-fathom-webhook
      CodeUri: ../src/fathom/webhook/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Timeout: 29  # API Gateway HTTP API max integration timeout
      Environment:
        Variables:
          WEBHOOK_SECRET: !Ref FathomWebhookSecret
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        FathomWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref SmsApi
            Path: /fathom/webhook
            Method: POST

  StripeFinanceReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-stripe-finance-report
      CodeUri: ../src/sync/stripe/finance_report/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          STRIPE_API_KEYS_B64: !Ref StripeApiKeysB64
          SES_FROM_ADDRESS: !Ref SesFromAddress
          SES_TO_ADDRESS: !Ref SesToAddress
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        WeekdayReport:
          Type: Schedule
          Properties:
            # 15:00 UTC = 10am CDT. Shifts to 9am in winter CST — adjust to cron(0 16 ...) if needed.
            Schedule: cron(0 15 ? * MON-FRI *)
            Name: gymlaunch-stripe-finance-report-weekday
            Enabled: true

Outputs:
  SlackFunctionArn:
    Value: !GetAtt SlackSyncFunction.Arn
  AsanaAgencyBoardSyncFunctionArn:
    Value: !GetAtt AsanaSyncFunction.Arn
  AsanaAgencyBoardDeepSyncFunctionArn:
    Value: !GetAtt AsanaDeepSyncFunction.Arn
  AgencyBoardToHubspotSyncFunctionArn:
    Value: !GetAtt HubspotSyncFunction.Arn
  SheetsSyncFunctionArn:
    Value: !GetAtt SheetsSyncFunction.Arn
  SmsInterceptorFunctionArn:
    Value: !GetAtt SmsInterceptorFunction.Arn
  PhoneValidatorFunctionArn:
    Value: !GetAtt PhoneValidatorFunction.Arn
  StripeFinanceReportFunctionArn:
    Value: !GetAtt StripeFinanceReportFunction.Arn
  FathomWebhookFunctionArn:
    Value: !GetAtt FathomWebhookFunction.Arn
  FathomWebhookUrl:
    Value: !Sub "https://${SmsApi}.execute-api.${AWS::Region}.amazonaws.com/fathom/webhook"
    Description: "Fathom call transcript webhook — point Zapier here"
  PhoneValidatorUrl:
    Value: !Sub "https://${SmsApi}.execute-api.${AWS::Region}.amazonaws.com/phone/validate"
    Description: "Phone normalization + Twilio Lookup endpoint for HubSpot code action"
  SmsApiUrl:
    Value: !Sub "https://${SmsApi}.execute-api.${AWS::Region}.amazonaws.com"
    Description: "Base URL for Twilio webhooks — append /sms/inbound and /sms/status"
  RoleArn:
    Value: !GetAtt SlackSyncRole.Arn
