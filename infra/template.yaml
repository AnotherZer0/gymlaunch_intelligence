AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: GymLaunch Intelligence — data lake sync Lambdas

Parameters:
  DbHost:
    Type: String
  DbName:
    Type: String
    Default: gymlaunch_intelligence
  DbUser:
    Type: String
    Default: gls_writer
  DbPassword:
    Type: String
    NoEcho: true
  SlackBotToken:
    Type: String
    NoEcho: true
  AsanaToken:
    Type: String
    NoEcho: true
  HubspotToken:
    Type: String
    NoEcho: true
  GoogleServiceAccountB64:
    Type: String
    NoEcho: true
  GoogleSheetId:
    Type: String
  DbSecurityGroupId:
    Type: String
  SubnetIds:
    Type: CommaDelimitedList
  TwilioAuthToken:
    Type: String
    NoEcho: true
  OctopodWebhookUrls:
    Type: String
    NoEcho: true
  TwilioAccountSid:
    Type: String
    NoEcho: true
  FathomWebhookSecret:
    Type: String
    NoEcho: true
  StripeApiKeysB64:
    Type: String
    NoEcho: true
  SesFromAddress:
    Type: String
  SesToAddress:
    Type: String
  SupabaseUrl:
    Type: String
    Description: "Supabase project URL (e.g. https://<ref>.supabase.co). Not secret."
  SupabaseServiceRoleKey:
    Type: String
    NoEcho: true
    Description: "Supabase service_role JWT — bypasses RLS, treat like a root password."
  LeadDb2SheetId:
    Type: String
    Description: "Google Sheet ID for the `Lead Integration Database V2.0` workbook (contains the `00 - Database` master client tab)."
  SfClientId:
    Type: String
    NoEcho: true
    Description: "SubscriptionFlow OAuth2 client_id (client-credentials grant)."
  SfClientSecret:
    Type: String
    NoEcho: true
    Description: "SubscriptionFlow OAuth2 client_secret (client-credentials grant)."
  SfEndpointApiKey:
    Type: String
    NoEcho: true
    Description: "Shared secret callers must present (x-api-key header or ?key=) to the SF subscribe Function URL."
  FathomApiKey:
    Type: String
    NoEcho: true
    Description: "Fathom API key for the nightly sync. X-Api-Key header on all Fathom API requests."
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: "Claude API key for the client pulse-summary Lambda."

Globals:
  Function:
    Runtime: python3.11
    Timeout: 900
    MemorySize: 512
    Environment:
      Variables:
        DB_HOST: !Ref DbHost
        DB_NAME: !Ref DbName
        DB_USER: !Ref DbUser
        DB_PASSWORD: !Ref DbPassword

Resources:

  SlackSyncRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: gymlaunch-slack-sync
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !Sub "arn:aws:iam::${AWS::AccountId}:policy/gymlaunch-lambda-boundary"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole

  SlackSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-slack-sync
      CodeUri: ../src/sync/slack/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          SLACK_BOT_TOKEN: !Ref SlackBotToken
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        HourlySync:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Name: gymlaunch-slack-sync-hourly
            Enabled: true

  AsanaSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-asana-agency-board-sync
      CodeUri: ../src/sync/asana/agency_board/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          ASANA_TOKEN: !Ref AsanaToken
          ASANA_PROJECT_GID: "1206006426591402"
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        HourlySync:
          Type: Schedule
          Properties:
            Schedule: cron(0 * * * ? *)
            Name: gymlaunch-asana-agency-board-sync-hourly
            Enabled: true

  HubspotSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-sync-agency-board-to-hubspot
      CodeUri: ../src/sync/hubspot/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          HUBSPOT_TOKEN: !Ref HubspotToken
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        HourlySync:
          Type: Schedule
          Properties:
            Schedule: cron(10 * * * ? *)
            Name: gymlaunch-sync-agency-board-to-hubspot-hourly
            Enabled: true


  SheetsSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-mb-capacity-sheet-sync
      CodeUri: ../src/sync/sheets/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          GOOGLE_SERVICE_ACCOUNT_B64: !Ref GoogleServiceAccountB64
          GOOGLE_SHEET_ID: !Ref GoogleSheetId
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        BusinessHoursSync:
          Type: Schedule
          Properties:
            Schedule: cron(0 12,16,20,0 * * ? *)
            Name: gymlaunch-sheets-sync-biz-hours
            Enabled: true

  HubspotToAsanaSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-sync-hubspot-to-agency-board
      CodeUri: ../src/sync/hubspot_to_asana/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          ASANA_TOKEN: !Ref AsanaToken
          HUBSPOT_TOKEN: !Ref HubspotToken
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        DailySync:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
            Name: gymlaunch-sync-hubspot-to-agency-board-daily
            Enabled: true

  AsanaDeepSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-asana-agency-board-deep-sync
      CodeUri: ../src/sync/asana/deep/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          ASANA_TOKEN: !Ref AsanaToken
          ASANA_PROJECT_GID: "1206006426591402"
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        DailySync:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
            Name: gymlaunch-asana-agency-board-deep-sync-daily
            Enabled: true

  # NOTE: gymlaunch-add-slack-channel is intentionally NOT defined here. The
  # deploy IAM user cannot create Lambda Function URLs (lambda:CreateFunctionUrlConfig
  # is not granted, and AddPermission is limited to the events/apigateway principals),
  # so that function is managed manually in the console: its code lives in
  # src/slack/add_channel/ and is pushed with `aws lambda update-function-code`,
  # and its Function URL + public permission are added via the console.

  # API Gateway for Twilio webhooks (inbound messages + status callbacks).
  # Both routes are handled by a single Lambda to share the HubSpot client and DB connection.
  SmsApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      Name: gymlaunch-intelligence

  SmsInterceptorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-sms-interceptor
      CodeUri: ../src/sms/interceptor/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Timeout: 29  # API Gateway HTTP API max integration timeout
      Environment:
        Variables:
          HUBSPOT_TOKEN: !Ref HubspotToken
          TWILIO_AUTH_TOKEN: !Ref TwilioAuthToken
          OCTOPODS_WEBHOOK_URLS: !Ref OctopodWebhookUrls
          # Maps Twilio numbers to channel names. Edit this JSON to add/remove numbers.
          # Format: {"ChannelName": ["+1XXXXXXXXXX", ...], ...}
          # Channel names must match the internal names in the sms_subscriptions HubSpot property.
          # After editing, run: bash scripts/deploy.sh
          TWILIO_NUMBER_CHANNELS: '{"Marketing": ["+12135661157", "+12135613526", "+12135795481","+17277883639"]}'
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        InboundSms:
          Type: HttpApi
          Properties:
            ApiId: !Ref SmsApi
            Path: /sms/inbound
            Method: POST
        StatusCallback:
          Type: HttpApi
          Properties:
            ApiId: !Ref SmsApi
            Path: /sms/status
            Method: POST

  PhoneValidatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-phone-validator
      CodeUri: ../src/phone/validator/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Timeout: 29  # API Gateway HTTP API max integration timeout
      Environment:
        Variables:
          TWILIO_ACCOUNT_SID: !Ref TwilioAccountSid
          TWILIO_AUTH_TOKEN: !Ref TwilioAuthToken
      Events:
        ValidatePhone:
          Type: HttpApi
          Properties:
            ApiId: !Ref SmsApi
            Path: /phone/validate
            Method: POST

  FathomWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-fathom-webhook
      CodeUri: ../src/fathom/webhook/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Timeout: 29  # API Gateway HTTP API max integration timeout
      Environment:
        Variables:
          WEBHOOK_SECRET: !Ref FathomWebhookSecret
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        FathomWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref SmsApi
            Path: /fathom/webhook
            Method: POST

  ProjectNoteSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-project-note-sync
      CodeUri: ../src/sync/hubspot_project_notes/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          HUBSPOT_TOKEN: !Ref HubspotToken
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        # Logical name "NightlySync" is kept intentionally — renaming this key
        # makes CloudFormation try to delete-and-recreate the underlying
        # AWS::Events::Rule, which collides on the `Name:` value below.
        # Cadence is actually every 72h now, sized to observed signal volume.
        NightlySync:
          Type: Schedule
          Properties:
            # Every 72h. Drifts off clock-time but this is a background maintenance
            # job — no user-facing impact, so the drift is fine.
            Schedule: rate(72 hours)
            Name: gymlaunch-project-note-sync-nightly
            Enabled: true

  StripeFinanceReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-stripe-finance-report
      CodeUri: ../src/sync/stripe/finance_report/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          STRIPE_API_KEYS_B64: !Ref StripeApiKeysB64
          SES_FROM_ADDRESS: !Ref SesFromAddress
          SES_TO_ADDRESS: !Ref SesToAddress
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        WeekdayReport:
          Type: Schedule
          Properties:
            # 15:00 UTC = 10am CDT. Shifts to 9am in winter CST — adjust to cron(0 16 ...) if needed.
            Schedule: cron(0 15 ? * MON-FRI *)
            Name: gymlaunch-stripe-finance-report-weekday
            Enabled: true

  SupabaseLeadSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-supabase-lead-sync
      CodeUri: ../src/sync/supabase_leads/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceRoleKey
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        # 08:00 UTC = 2am CST in winter, 3am CDT in summer. Either way it's the
        # middle of the night and well after upstream webhooks have settled.
        DailySync:
          Type: Schedule
          Properties:
            Schedule: cron(0 8 * * ? *)
            Name: gymlaunch-supabase-lead-sync-daily
            Enabled: true

  LeadDb2SheetSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-lead_db2-sheet-sync
      CodeUri: ../src/sync/lead_db2_sheet/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          GOOGLE_SERVICE_ACCOUNT_B64: !Ref GoogleServiceAccountB64
          LEAD_DB2_SHEET_ID: !Ref LeadDb2SheetId
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        # 07:00 UTC — fires one hour before gymlaunch-supabase-lead-sync so the
        # client master snapshot is fresh by the time the lead mirror runs (and
        # any phase-2 compare picks up the right system_user flag per client).
        DailySync:
          Type: Schedule
          Properties:
            Schedule: cron(0 7 * * ? *)
            Name: gymlaunch-lead_db2-sheet-sync-daily
            Enabled: true

  FathomDailySyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-fathom-daily-sync
      CodeUri: ../src/fathom/sync/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          FATHOM_API_KEY: !Ref FathomApiKey
          # Set to "true" in Lambda console for initial full backfill, then back to "false".
          # Full sync skips meetings already in DB with a transcript; normal run covers last 48h.
          FULL_SYNC: "false"
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        NightlySync:
          Type: Schedule
          Properties:
            # 04:00 UTC = 11pm CDT / 10pm CST — clean gap between midnight and 7am morning jobs.
            Schedule: cron(0 4 * * ? *)
            Name: gymlaunch-fathom-daily-sync-nightly
            Enabled: true

  # SubscriptionFlow "create custom weekly sub for GO product" endpoint.
  # Invoked via a Lambda Function URL. As with gymlaunch-add-slack-channel, the
  # deploy IAM user cannot create Function URLs (lambda:CreateFunctionUrlConfig
  # is not granted), so this stack provisions the function — role, VPC, env vars
  # — but the Function URL itself is enabled MANUALLY in the console after
  # deploy. The URL persists across SAM deploys because CloudFormation does not
  # manage it. The function needs the VPC for RDS (token cache) and reaches the
  # SF API over the VPC's existing egress path.
  SfCreateGoSubFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-sf-create-custom-weekly-sub-for-go-product
      CodeUri: ../src/subscriptionflow/create_sub/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Timeout: 30
      Environment:
        Variables:
          SF_CLIENT_ID: !Ref SfClientId
          SF_CLIENT_SECRET: !Ref SfClientSecret
          SF_ENDPOINT_API_KEY: !Ref SfEndpointApiKey
          # Dry-run switch. "0" = live; set to "1" in the console for a SAFE dry
          # run (authenticates, fetches token, read-only customer lookup, then
          # returns the subscription body it WOULD post — creates nothing).
          # NOTE: a console change to "1" is reset to "0" on the next deploy.
          DEBUG: "0"
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds

  # --- AI Brain Phase 1 ---------------------------------------------------

  # Populates the identity layer (client_account / client_external_id) from the
  # Asana board + an on-demand HubSpot company-property read (Slack channel).
  # Daily, idempotent. Needs HUBSPOT_TOKEN and VPC access to RDS.
  ClientIdentityResolverFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-client-identity-resolver
      CodeUri: ../src/identity/resolver/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          HUBSPOT_TOKEN: !Ref HubspotToken
          # HubSpot company-property internal name holding the Slack channel id.
          # Leave empty to auto-discover (the chosen name is logged); set it here
          # once known to pin it, then redeploy.
          SLACK_CHANNEL_PROPERTY: ""
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        DailyResolve:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
            Name: gymlaunch-client-identity-resolver-daily
            Enabled: true

  # Bi-weekly client "pulse check": summarizes the last 14 days of Slack/Asana/
  # Fathom for each allowlisted active client and stores it in client_period_summary.
  ClientPulseSummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-client-pulse-summary
      CodeUri: ../src/pulse/summary/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          # Comma-separated client_account ids to run the pulse on (the test
          # clients). Intersected with client_account.active. Edit + redeploy.
          ALLOWLIST_CLIENT_ACCOUNT_IDS: ""
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        BiweeklyPulse:
          Type: Schedule
          Properties:
            Schedule: rate(14 days)
            Name: gymlaunch-client-pulse-summary-biweekly
            Enabled: true

  # Daily SF -> RDS payment-data sync (customers/subscriptions/invoices/transactions/
  # products into the sf_* tables from migration 014). Incremental upsert; reuses the
  # OAuth token cache from the subscribe function.
  SubscriptionFlowSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-subscriptionflow-daily-sync
      CodeUri: ../src/subscriptionflow/sync/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          SF_CLIENT_ID: !Ref SfClientId
          SF_CLIENT_SECRET: !Ref SfClientSecret
          # DEBUG=1 = dry run (fetch a small sample per object, write NOTHING, return what
          # it parsed). FULL_SYNC=1 ignores the watermark and backfills every object (use
          # for the first run / a re-sync). Flip either in the console; both reset to "0"
          # on the next deploy.
          DEBUG: "0"
          FULL_SYNC: "0"
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        DailySync:
          Type: Schedule
          Properties:
            # 06:30 UTC — a clean gap between the other daily crons (fathom 04:00,
            # lead_db2 07:00, supabase 08:00) and off the top-of-hour Asana jobs.
            Schedule: cron(30 6 * * ? *)
            Name: gymlaunch-subscriptionflow-daily-sync
            Enabled: true

  # Pushes computed SF billing fields onto HubSpot companies. Runs right after the
  # 06:30 sync. Only writes companies whose values changed (sf_hubspot_push_state), so
  # daily API load is tiny. Reuses HubspotToken; needs VPC for RDS + HubSpot egress.
  SfBillingToHubspotFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gymlaunch-sync-sf-billing-info-to-hubspot
      CodeUri: ../src/subscriptionflow/hubspot_push/
      Handler: handler.lambda_handler
      Role: !GetAtt SlackSyncRole.Arn
      Environment:
        Variables:
          HUBSPOT_TOKEN: !Ref HubspotToken
          # DEBUG=1 = dry run: compute + report a sample and the changed-count, write
          # NOTHING to HubSpot and touch no state. Resets to "0" on deploy.
          DEBUG: "0"
      VpcConfig:
        SecurityGroupIds:
          - !Ref DbSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Events:
        DailyPush:
          Type: Schedule
          Properties:
            # 06:45 UTC — right after the 06:30 SF->RDS sync, so HubSpot gets fresh data.
            Schedule: cron(45 6 * * ? *)
            Name: gymlaunch-sf-billing-to-hubspot-daily
            Enabled: true

Outputs:
  SlackFunctionArn:
    Value: !GetAtt SlackSyncFunction.Arn
  AsanaAgencyBoardSyncFunctionArn:
    Value: !GetAtt AsanaSyncFunction.Arn
  AsanaAgencyBoardDeepSyncFunctionArn:
    Value: !GetAtt AsanaDeepSyncFunction.Arn
  AgencyBoardToHubspotSyncFunctionArn:
    Value: !GetAtt HubspotSyncFunction.Arn
  HubspotToAgencyBoardSyncFunctionArn:
    Value: !GetAtt HubspotToAsanaSyncFunction.Arn
  SheetsSyncFunctionArn:
    Value: !GetAtt SheetsSyncFunction.Arn
  SmsInterceptorFunctionArn:
    Value: !GetAtt SmsInterceptorFunction.Arn
  PhoneValidatorFunctionArn:
    Value: !GetAtt PhoneValidatorFunction.Arn
  StripeFinanceReportFunctionArn:
    Value: !GetAtt StripeFinanceReportFunction.Arn
  ProjectNoteSyncFunctionArn:
    Value: !GetAtt ProjectNoteSyncFunction.Arn
  FathomWebhookFunctionArn:
    Value: !GetAtt FathomWebhookFunction.Arn
  FathomDailySyncFunctionArn:
    Value: !GetAtt FathomDailySyncFunction.Arn
  SupabaseLeadSyncFunctionArn:
    Value: !GetAtt SupabaseLeadSyncFunction.Arn
  LeadDb2SheetSyncFunctionArn:
    Value: !GetAtt LeadDb2SheetSyncFunction.Arn
  SfCreateGoSubFunctionArn:
    Value: !GetAtt SfCreateGoSubFunction.Arn
  SubscriptionFlowSyncFunctionArn:
    Value: !GetAtt SubscriptionFlowSyncFunction.Arn
  SfBillingToHubspotFunctionArn:
    Value: !GetAtt SfBillingToHubspotFunction.Arn
    Description: "SubscriptionFlow subscribe endpoint — enable a Function URL on this function in the console."
  ClientIdentityResolverFunctionArn:
    Value: !GetAtt ClientIdentityResolverFunction.Arn
  ClientPulseSummaryFunctionArn:
    Value: !GetAtt ClientPulseSummaryFunction.Arn
  FathomWebhookUrl:
    Value: !Sub "https://${SmsApi}.execute-api.${AWS::Region}.amazonaws.com/fathom/webhook"
    Description: "Fathom call transcript webhook — point Zapier here"
  PhoneValidatorUrl:
    Value: !Sub "https://${SmsApi}.execute-api.${AWS::Region}.amazonaws.com/phone/validate"
    Description: "Phone normalization + Twilio Lookup endpoint for HubSpot code action"
  SmsApiUrl:
    Value: !Sub "https://${SmsApi}.execute-api.${AWS::Region}.amazonaws.com"
    Description: "Base URL for Twilio webhooks — append /sms/inbound and /sms/status"
  RoleArn:
    Value: !GetAtt SlackSyncRole.Arn
